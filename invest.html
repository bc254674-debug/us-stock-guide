<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>投资小学堂 — 美股模拟交易</title>
  <meta name="description" content="美股模拟交易平台，$100,000虚拟资金练习买卖美股，零风险积累投资经验。">
  <link rel="stylesheet" href="styles.css">
  <!-- Google AdSense -->
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-XXXXXXXXXXXXXXXX" crossorigin="anonymous"></script>
  <!-- Microsoft Advertising -->
  <script async src="https://adsdk.microsoft.com/pubcenter/XXXXXXXX.js" crossorigin="anonymous"></script>
</head>
<body class="invest-page">

  <!-- ===== 导航栏 ===== -->
  <nav class="navbar" id="navbar">
    <div class="nav-container">
      <a href="index.html" class="nav-logo">US Stock Guide</a>
      <ul class="nav-links">
        <li><a href="index.html">← 返回首页</a></li>
      </ul>
      <button class="nav-toggle" id="navToggle" aria-label="菜单">☰</button>
    </div>
  </nav>

  <!-- ===== 顶部资产概览 ===== -->
  <div class="invest-topbar" id="investTopbar">
    <div class="invest-topbar-inner">
      <div class="invest-balance-item">
        <span class="inv-label">可用资金</span>
        <span class="inv-value" id="invCash">$100,000.00</span>
      </div>
      <div class="invest-balance-item">
        <span class="inv-label">持仓市值</span>
        <span class="inv-value" id="invHoldingsVal">$0.00</span>
      </div>
      <div class="invest-balance-item">
        <span class="inv-label">总资产</span>
        <span class="inv-value highlight" id="invTotal">$100,000.00</span>
      </div>
      <div class="invest-balance-item">
        <span class="inv-label">总收益率</span>
        <span class="inv-value" id="invReturn">--</span>
      </div>
    </div>
  </div>

  <!-- ===== 主内容区 ===== -->
  <div class="invest-main">

    <!-- 左侧：股票列表 + 交易面板 -->
    <div class="invest-left">

      <!-- 行情表格 -->
      <div class="invest-section">
        <div class="invest-section-header">
          <h3>美股行情</h3>
          <input type="text" id="stockSearch" class="invest-search" placeholder="搜索代码或名称...">
        </div>
        <div class="invest-table-wrap">
          <table class="invest-table">
            <thead>
              <tr>
                <th>代码</th>
                <th>名称</th>
                <th>最新价</th>
                <th>涨跌额</th>
                <th>涨跌幅</th>
                <th>操作</th>
              </tr>
            </thead>
            <tbody id="stockTableBody"></tbody>
          </table>
        </div>
      </div>

      <!-- 交易面板 -->
      <div class="invest-section" id="tradePanel" style="display:none;">
        <div class="invest-section-header">
          <h3 id="tradePanelTitle">交易</h3>
          <button class="invest-btn-close" id="btnCloseTrade">✕</button>
        </div>
        <div class="trade-tabs">
          <button class="trade-tab active" data-trade="buy">买入</button>
          <button class="trade-tab" data-trade="sell">卖出</button>
        </div>

        <!-- 买入表单 -->
        <div class="trade-form active" id="formBuy">
          <div class="form-row">
            <label>股票</label>
            <div class="form-stock-display" id="buyStockDisplay">--</div>
          </div>
          <div class="form-row">
            <label>当前价格</label>
            <div class="form-price-display" id="buyPrice">--</div>
          </div>
          <div class="form-row">
            <label>买入数量（股）</label>
            <input type="number" id="buyQty" min="1" step="1" value="10" class="invest-input">
            <span class="form-hint">美股最小交易1股</span>
          </div>
          <div class="form-row">
            <label>预计花费</label>
            <div class="form-price-display highlight" id="buyCost">--</div>
          </div>
          <button class="invest-btn-primary" id="btnBuy">确认买入</button>
        </div>

        <!-- 卖出表单 -->
        <div class="trade-form" id="formSell" style="display:none;">
          <div class="form-row">
            <label>股票</label>
            <div class="form-stock-display" id="sellStockDisplay">--</div>
          </div>
          <div class="form-row">
            <label>当前价格 / 持仓</label>
            <div class="form-price-display" id="sellInfo">--</div>
          </div>
          <div class="form-row">
            <label>卖出数量（股）</label>
            <input type="number" id="sellQty" min="1" step="1" value="10" class="invest-input">
          </div>
          <div class="form-row">
            <label>预计收入</label>
            <div class="form-price-display highlight" id="sellRevenue">--</div>
          </div>
          <button class="invest-btn-primary btn-sell" id="btnSell">确认卖出</button>
        </div>
      </div>

    </div>

    <!-- 右侧：持仓 + 交易记录 -->
    <div class="invest-right">

      <!-- 持仓列表 -->
      <div class="invest-section">
        <h3 class="invest-section-title">我的持仓</h3>
        <div class="invest-table-wrap">
          <table class="invest-table">
            <thead>
              <tr><th>代码</th><th>名称</th><th>数量</th><th>成本</th><th>现价</th><th>盈亏</th></tr>
            </thead>
            <tbody id="holdingsBody">
              <tr><td colspan="6" class="empty-cell">暂无持仓，去左侧开始模拟交易吧</td></tr>
            </tbody>
          </table>
        </div>
      </div>

      <!-- 交易记录 -->
      <div class="invest-section">
        <h3 class="invest-section-title">交易记录</h3>
        <div class="trade-history-list" id="tradeHistory">
          <div class="empty-cell">暂无交易记录</div>
        </div>
      </div>

      <!-- 重置按钮 -->
      <div style="text-align:center;margin-top:20px;">
        <button class="invest-btn-reset" id="btnReset">重置账户（恢复 $100,000）</button>
      </div>

    </div>
  </div>

  <footer class="footer">
    <div class="container">
      <p>模拟交易数据仅供学习，不构成投资建议。</p>
      <p>投资有风险，入市需谨慎。</p>
      <p class="footer-copy">&copy; 2026 US Stock Guide for Beginners ｜ <a href="privacy.html" style="color:var(--text-muted)">隐私政策</a> ｜ <a href="terms.html" style="color:var(--text-muted)">服务条款</a></p>
    </div>
  </footer>

  <script src="invest.js"></script>
  <script src="cookie-banner.js"></script>
</body>
</html>

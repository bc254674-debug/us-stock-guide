  <script>
    (function() {
      var canvas = document.getElementById('dotCanvas');
      var ctx = canvas.getContext('2d');

      /* ==================== 参数 ==================== */
      var SPACING   = 26;        // 网格间距
      var DOT_R     = 1.6;       // 静止点半径
      var DOT_R_MAX = 4.8;       // 激活最大半径
      var MOUSE_R   = 140;       // 鼠标影响半径
      var DAMPING   = 0.06;      // 位移衰减速度
      var MOTION_F  = 0.35;      // 鼠标吸引力强度
      var ACCENT    = '#3b82f6';
      var ACCENT_DIM = 'rgba(59,130,246,0.16)';

      /* ==================== 状态 ==================== */
      var mouse = { x: -9999, y: -9999 };
      var cols = 0, rows = 0;
      var dots = [];

      /* ==================== 缓动函数 ==================== */
      function easeOutCubic(t) { return 1 - Math.pow(1 - t, 3); }
      function easeOutExpo(t) { return t === 1 ? 1 : 1 - Math.pow(2, -10 * t); }

      /* ==================== 初始化 ==================== */
      function resize() {
        canvas.width  = window.innerWidth;
        canvas.height = window.innerHeight;
        cols = Math.ceil(canvas.width  / SPACING) + 1;
        rows = Math.ceil(canvas.height / SPACING) + 1;
        dots = [];
        for (var r = 0; r < rows; r++) {
          for (var c = 0; c < cols; c++) {
            dots.push({
              bx: c * SPACING,        // 基准 x
              by: r * SPACING,        // 基准 y
              ox: 0,                  // 偏移 x
              oy: 0,                  // 偏移 y
              radius: DOT_R,
              targetRadius: DOT_R
            });
          }
        }
      }

      /* ==================== 鼠标追踪 ==================== */
      var rafPending = false;
      window.addEventListener('mousemove', function(e) {
        mouse.x = e.clientX;
        mouse.y = e.clientY;
        if (!rafPending) {
          rafPending = true;
          requestAnimationFrame(function() { rafPending = false; });
        }
      });

      window.addEventListener('mouseleave', function() {
        mouse.x = -9999;
        mouse.y = -9999;
      });

      /* ==================== 触摸支持 ==================== */
      window.addEventListener('touchmove', function(e) {
        mouse.x = e.touches[0].clientX;
        mouse.y = e.touches[0].clientY;
        if (!rafPending) {
          rafPending = true;
          requestAnimationFrame(function() { rafPending = false; });
        }
      }, { passive: true });

      window.addEventListener('touchend', function() {
        mouse.x = -9999;
        mouse.y = -9999;
      });

      /* ==================== 动画循环 ==================== */
      function tick() {
        var mx = mouse.x;
        var my = mouse.y;
        var mr = MOUSE_R;

        for (var i = 0; i < dots.length; i++) {
          var d = dots[i];

          // 计算到鼠标的距离
          var dx = mx - d.bx;
          var dy = my - d.by;
          var dist = Math.sqrt(dx * dx + dy * dy);

          if (dist < mr) {
            // 在影响范围内：计算力度（越近越强）
            var t = 1 - dist / mr;
            var force = easeOutExpo(t);
            var angle = Math.atan2(dy, dx);

            // 目标偏移：点向鼠标方向轻微位移
            d.ox += (Math.cos(angle) * force * MOTION_F * 14 - d.ox) * 0.28;
            d.oy += (Math.sin(angle) * force * MOTION_F * 14 - d.oy) * 0.28;

            // 目标半径：随力度增大
            d.targetRadius = DOT_R + (DOT_R_MAX - DOT_R) * force;
          } else {
            // 范围外：回弹
            d.ox += (0 - d.ox) * DAMPING;
            d.oy += (0 - d.oy) * DAMPING;
            d.targetRadius += (DOT_R - d.targetRadius) * 0.12;
          }

          // 半径平滑过渡
          d.radius += (d.targetRadius - d.radius) * 0.18;
        }

        draw();
        requestAnimationFrame(tick);
      }

      /* ==================== 绘制 ==================== */
      function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        for (var i = 0; i < dots.length; i++) {
          var d = dots[i];
          var x = d.bx + d.ox;
          var y = d.by + d.oy;
          var r = d.radius;

          // 跳过屏幕外的点
          if (x < -SPACING || x > canvas.width  + SPACING ||
              y < -SPACING || y > canvas.height + SPACING) continue;

          // 颜色：根据激活程度在灰色和蓝色之间插值
          var t = (r - DOT_R) / (DOT_R_MAX - DOT_R + 0.01);
          t = Math.min(Math.max(t, 0), 1);

          ctx.beginPath();
          ctx.arc(x, y, r, 0, Math.PI * 2);
          ctx.fillStyle = t > 0.05
            ? 'rgba(59,130,246,' + (0.18 + t * 0.62).toFixed(2) + ')'
            : 'rgba(139,143,163,0.28)';
          ctx.fill();
        }
      }

      /* ==================== 启动 ==================== */
      resize();
      tick();
      window.addEventListener('resize', resize);
    })();
  </script>
